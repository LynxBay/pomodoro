<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>番茄钟</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <h1>番茄钟</h1>

    <div class="mode-tabs">
      <button class="tab active" data-mode="work">专注</button>
      <button class="tab" data-mode="shortBreak">短休息</button>
      <button class="tab" data-mode="longBreak">长休息</button>
    </div>

    <div class="timer-ring">
      <svg viewBox="0 0 200 200">
        <circle class="ring-bg" cx="100" cy="100" r="90" />
        <circle class="ring-progress" cx="100" cy="100" r="90" />
      </svg>
      <div class="timer-display">
        <span id="minutes">25</span>:<span id="seconds">00</span>
      </div>
    </div>

    <div class="controls">
      <button id="startBtn" class="btn primary">开始</button>
      <button id="resetBtn" class="btn secondary">重置</button>
    </div>

    <div class="session-info">
      <span>已完成 <strong id="sessionCount">0</strong> 个番茄</span>
    </div>

    <div class="settings">
      <details>
        <summary>设置</summary>
        <div class="settings-grid">
          <label>专注时长 (分钟)
            <input type="number" id="workDuration" value="25" min="1" max="60">
          </label>
          <label>短休息 (分钟)
            <input type="number" id="shortBreakDuration" value="5" min="1" max="30">
          </label>
          <label>长休息 (分钟)
            <input type="number" id="longBreakDuration" value="15" min="1" max="60">
          </label>
        </div>
      </details>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
